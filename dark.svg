<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 610" width="1180" height="610">
  <defs>
    <!-- Dark Mode Color Palette Gradients -->
    <linearGradient id="bg-grad-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030712" />
      <stop offset="50%" stop-color="#0B132B" />
      <stop offset="100%" stop-color="#030712" />
    </linearGradient>

    <linearGradient id="panel-grad-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" stop-opacity="0.85" />
      <stop offset="100%" stop-color="#1E293B" stop-opacity="0.60" />
    </linearGradient>

    <linearGradient id="accent-grad-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED" />
      <stop offset="50%" stop-color="#22D3EE" />
      <stop offset="100%" stop-color="#10B981" />
    </linearGradient>

    <linearGradient id="ascii-grad-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22D3EE">
        <animate attributeName="stop-color" values="#22D3EE; #7C3AED; #10B981; #22D3EE" dur="8s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#7C3AED">
        <animate attributeName="stop-color" values="#7C3AED; #10B981; #22D3EE; #7C3AED" dur="8s" repeatCount="indefinite" />
      </stop>
    </linearGradient>

    <linearGradient id="border-shimmer-dark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.05)" />
      <stop offset="50%" stop-color="rgba(34,211,238,0.4)" />
      <stop offset="100%" stop-color="rgba(255,255,255,0.05)" />
      <animateTransform attributeName="gradientTransform" type="translate" from="-1180 0" to="1180 0" dur="6s" repeatCount="indefinite" />
    </linearGradient>

    <!-- Floating Background Orbs -->
    <radialGradient id="orb-purple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#030712" stop-opacity="0" />
    </radialGradient>

    <radialGradient id="orb-cyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.20" />
      <stop offset="100%" stop-color="#030712" stop-opacity="0" />
    </radialGradient>

    <!-- Glassmorphism Drop Shadow -->
    <filter id="shadow-dark" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.5" />
    </filter>

    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <style>
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }
    @keyframes pulseGlow {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.6; }
    }
    @keyframes scanline {
      0% { transform: translateY(-610px); }
      100% { transform: translateY(610px); }
    }
    @keyframes blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }

    .bg-animate { animation: pulseGlow 6s ease-in-out indefinite alternate; }
    .floating-box { animation: float 6s ease-in-out infinite; }
    .cursor { animation: blink 1s step-end infinite; }
    .text-title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif; font-weight: 700; fill: #F8FAFC; }
    .text-mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace; fill: #94A3B8; }
    .text-accent { fill: #22D3EE; font-weight: 600; }
    .pill { transition: all 0.3s ease; }
    .pill:hover { fill: #7C3AED; }
  </style>

  <!-- Background Base -->
  <rect width="1180" height="610" rx="24" fill="url(#bg-grad-dark)" />

  <!-- Background Animated Glowing Ambient Orbs -->
  <circle cx="200" cy="150" r="300" fill="url(#orb-purple)" class="bg-animate" />
  <circle cx="950" cy="450" r="350" fill="url(#orb-cyan)" class="bg-animate" />

  <!-- Grid Pattern Overlay -->
  <g opacity="0.05" stroke="#F8FAFC" stroke-width="1">
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
