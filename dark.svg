    </pattern>
    <rect width="1180" height="610" fill="url(#grid)" />
  </g>

  <!-- Animated Moving Scanline -->
  <rect width="1180" height="2" fill="url(#accent-grad-dark)" opacity="0.15">
    <animateTransform attributeName="gradientTransform" type="translate" from="0 -610" to="0 610" dur="8s" repeatCount="indefinite" />
  </rect>

