name: Update Profile Contribution Art

on:
  schedule:
    - cron: "17 6 * * *" # Daily at 06:17 UTC
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  heatmap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Fetch Live GitHub Contributions
        run: python scripts/fetch_contributions.py

      - name: Render Animated Heatmap SVG
        run: python scripts/render_heatmap_svg.py

      - name: Auto-Commit Refreshed Heatmap
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh daily contribution heatmap [skip ci]"
          file_pattern: "data/contributions.json contrib-heatmap.svg"
